server {
    listen 80;
    
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy requests to /monsters-service to the backend
    location /monsters-service/ {
        # Note: trailing slash is important to strip /monsters-service/
        proxy_pass http://api-monsters:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy requests to /joueur-service to the backend
    location /joueur-service/ {
        # Note: trailing slash is important to strip /joueur-service/
        proxy_pass http://api-joueur:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy requests to /auth-service to the backend
    location /auth-service/ {
        # Note: trailing slash is important to strip /auth-service/
        proxy_pass http://api-authentification:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy requests to /invocation-service to the backend
    location /invocation-service/ {
        proxy_pass http://api-invocations:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
